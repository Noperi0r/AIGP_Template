<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#475569" /></marker>
  <marker id="arrow-small" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L7,3 z" fill="#64748B" /></marker>
  <style>
  .title { font: 700 44px Arial, sans-serif; fill: #111827; }
  .subtitle { font: 400 20px Arial, sans-serif; fill: #4B5563; }
  .head { font: 700 24px Arial, sans-serif; fill: #111827; }
  .label { font: 700 18px Arial, sans-serif; fill: #111827; }
  .body { font: 400 18px Arial, sans-serif; fill: #374151; }
  .small { font: 400 15px Arial, sans-serif; fill: #4B5563; }
  .code { font: 600 16px 'Courier New', monospace; fill: #1F2937; }
  .box { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 2; rx: 18; ry: 18; }
  .bt { fill: #FFF7ED; stroke: #FDBA74; }
  .rl { fill: #EFF6FF; stroke: #93C5FD; }
  .shared { fill: #F0FDF4; stroke: #86EFAC; }
  .exec { fill: #F8FAFC; stroke: #CBD5E1; }
  .metric { fill: #FAF5FF; stroke: #C084FC; }
  .arrow { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrow); }
  .thin { stroke: #64748B; stroke-width: 2; fill: none; marker-end: url(#arrow-small); }
</style>
</defs>
<rect width="100%" height="100%" fill="#FAFAFA"/>
<text x="70" y="75" class="title">Behavior Tree Baselines</text><text x="70" y="110" class="subtitle">Scripted attacker/defender logic used as the BT side of the comparison</text><rect x="70" y="165" width="620" height="650" class="box bt"/><text x="110" y="210" class="head">Attacker BT</text><circle cx="120" cy="252" r="19" fill="#FDBA74"/><text x="113" y="258" class="label">1</text><text x="165" y="260" class="label">Low HP + dodge ready?</text><text x="165" y="292" class="body">Dodge away</text><path d="M120 282 L120 332" class="thin"/><circle cx="120" cy="387" r="19" fill="#FDBA74"/><text x="113" y="393" class="label">2</text><text x="165" y="395" class="label">Attack ready + in range?</text><text x="165" y="427" class="body">Attack</text><path d="M120 417 L120 467" class="thin"/><circle cx="120" cy="522" r="19" fill="#FDBA74"/><text x="113" y="528" class="label">3</text><text x="165" y="530" class="label">Otherwise</text><text x="165" y="562" class="body">Move toward target</text><rect x="120" y="675" width="500" height="75" class="box shared"/><text x="155" y="720" class="code">Outputs: Dodge | Attack | Move</text><rect x="810" y="165" width="620" height="650" class="box bt"/><text x="850" y="210" class="head">Defender BT</text><circle cx="860" cy="252" r="19" fill="#FDBA74"/><text x="852" y="258" class="label">1</text><text x="905" y="260" class="label">Low HP + dodge ready?</text><text x="905" y="292" class="body">Dodge away</text><path d="M860 282 L860 332" class="thin"/><circle cx="860" cy="357" r="19" fill="#FDBA74"/><text x="852" y="363" class="label">2</text><text x="905" y="365" class="label">Incoming threat + block ready?</text><text x="905" y="397" class="body">Block</text><path d="M860 387 L860 437" class="thin"/><circle cx="860" cy="462" r="19" fill="#FDBA74"/><text x="852" y="468" class="label">3</text><text x="905" y="470" class="label">Close target + dodge ready?</text><text x="905" y="502" class="body">Dodge</text><path d="M860 492 L860 542" class="thin"/><circle cx="860" cy="567" r="19" fill="#FDBA74"/><text x="852" y="573" class="label">4</text><text x="905" y="575" class="label">Close target + attack ready?</text><text x="905" y="607" class="body">Counterattack</text><path d="M860 597 L860 647" class="thin"/><circle cx="860" cy="672" r="19" fill="#FDBA74"/><text x="852" y="678" class="label">5</text><text x="905" y="680" class="label">Otherwise</text><text x="905" y="712" class="body">Maintain distance</text><rect x="860" y="735" width="500" height="75" class="box shared"/><text x="895" y="780" class="code">Outputs: Dodge | Block | Attack | Move</text></svg>