<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="950" viewBox="0 0 1600 950">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#475569" /></marker>
  <marker id="arrow-small" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L7,3 z" fill="#64748B" /></marker>
  <style>
  .title { font: 700 44px Arial, sans-serif; fill: #111827; }
  .subtitle { font: 400 20px Arial, sans-serif; fill: #4B5563; }
  .head { font: 700 24px Arial, sans-serif; fill: #111827; }
  .label { font: 700 18px Arial, sans-serif; fill: #111827; }
  .body { font: 400 18px Arial, sans-serif; fill: #374151; }
  .small { font: 400 15px Arial, sans-serif; fill: #4B5563; }
  .code { font: 600 16px 'Courier New', monospace; fill: #1F2937; }
  .box { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 2; rx: 18; ry: 18; }
  .bt { fill: #FFF7ED; stroke: #FDBA74; }
  .rl { fill: #EFF6FF; stroke: #93C5FD; }
  .shared { fill: #F0FDF4; stroke: #86EFAC; }
  .exec { fill: #F8FAFC; stroke: #CBD5E1; }
  .metric { fill: #FAF5FF; stroke: #C084FC; }
  .arrow { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrow); }
  .thin { stroke: #64748B; stroke-width: 2; fill: none; marker-end: url(#arrow-small); }
</style>
</defs>
<rect width="100%" height="100%" fill="#FAFAFA"/>
<text x="80" y="80" class="title">BT vs RL Combat-AI Comparison Structure</text><text x="80" y="115" class="subtitle">Separate decision logic, shared combat execution, comparable experiment output</text><rect x="80" y="170" width="600" height="270" class="box bt"/><text x="110" y="215" class="head">Behavior Tree path</text><text x="110" y="260" class="body">Condition checks: distance, cooldown, health, facing</text>
<text x="110" y="294" class="body">Tree logic selects a scripted combat response</text>
<text x="110" y="328" class="body">Output: approach, attack, block, dodge, counter</text><rect x="920" y="170" width="600" height="270" class="box rl"/><text x="950" y="215" class="head">ML-Agents path</text><text x="950" y="260" class="body">Observations: health, relative position, distance, cooldowns</text>
<text x="950" y="294" class="body">PPO policy maps state to a discrete skill action</text>
<text x="950" y="328" class="body">Output: attack, block, dodge, or no skill</text><rect x="470" y="535" width="660" height="135" class="box shared"/><text x="515" y="580" class="head">Shared Action Boundary</text><text x="515" y="625" class="code">Move(direction)  |  Attack()  |  Block()  |  Dodge(direction)</text><path d="M380 440 C380 490 540 505 650 535" class="arrow"/><path d="M1220 440 C1220 490 1060 505 950 535" class="arrow"/><rect x="470" y="735" width="660" height="115" class="box exec"/><text x="515" y="778" class="head">Combat Resolution</text><text x="515" y="818" class="body">Cooldown gates, hit checks, animation timing, state update, episode reset</text><path d="M800 670 L800 735" class="arrow"/><rect x="80" y="735" width="300" height="115" class="box metric"/><text x="115" y="778" class="head">BT Strategy</text><text x="115" y="818" class="body">Condition-action branches</text><rect x="1220" y="735" width="300" height="115" class="box metric"/><text x="1255" y="778" class="head">RL Policy</text><text x="1255" y="818" class="body">Learned behavior from rewards</text><path d="M470 795 L380 795" class="thin"/><path d="M1130 795 L1220 795" class="thin"/><text x="510" y="905" class="small">Comparison target: win rate, survival time, action distribution, and failure cases under the same fight rules</text></svg>