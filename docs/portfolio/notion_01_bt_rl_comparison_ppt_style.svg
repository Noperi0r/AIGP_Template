<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900">

<defs>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,8 L11,4 z" fill="#555"/>
  </marker>
  <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,8 L11,4 z" fill="#a61923"/>
  </marker>
  
<style>
.title { font: 800 38px 'Pretendard', 'Inter', Arial, sans-serif; fill: #a61923; }
.subtitle { font: 500 17px 'Pretendard', 'Inter', Arial, sans-serif; fill: #555; }
.panel-title { font: 800 27px 'Pretendard', 'Inter', Arial, sans-serif; fill: #a61923; }
.box-title { font: 800 23px 'Pretendard', 'Inter', Arial, sans-serif; fill: #222; }
.box-sub { font: 500 18px 'Pretendard', 'Inter', Arial, sans-serif; fill: #606060; }
.small { font: 700 16px 'Pretendard', 'Inter', Arial, sans-serif; fill: #a61923; }
.code { font: 700 17px 'JetBrains Mono', 'Consolas', monospace; fill: #333; }
.out { font: 700 19px 'Pretendard', 'Inter', Arial, sans-serif; fill: #222; }
</style>

</defs>
<rect width="1500" height="900" fill="#ffffff"/>
<text x="72" y="70" class="title">BT/RL Combat-AI Comparison Structure</text>
<text x="72" y="103" class="subtitle">Different decision models are evaluated through the same action boundary and combat rules.</text>

<!-- top panels -->
<rect x="70" y="140" width="600" height="245" rx="16" fill="#fff" stroke="#a61923" stroke-width="4"/>
<rect x="70" y="140" width="600" height="65" rx="14" fill="#fae9eb"/>
<text x="110" y="183" class="panel-title">Behavior Tree Agent</text>
<rect x="120" y="235" width="500" height="52" rx="8" fill="#fff" stroke="#a61923" stroke-width="2.5"/>
<text x="150" y="268" class="box-title">Condition-action branches</text>
<rect x="120" y="310" width="500" height="52" rx="8" fill="#fff" stroke="#a61923" stroke-width="2.5"/>
<text x="150" y="343" class="box-sub">distance / cooldown / health / facing</text>

<rect x="830" y="140" width="600" height="245" rx="16" fill="#fff" stroke="#a61923" stroke-width="4"/>
<rect x="830" y="140" width="600" height="65" rx="14" fill="#fae9eb"/>
<text x="870" y="183" class="panel-title">RL Agent</text>
<rect x="880" y="235" width="500" height="52" rx="8" fill="#fff" stroke="#a61923" stroke-width="2.5"/>
<text x="910" y="268" class="box-title">Observation to PPO policy</text>
<rect x="880" y="310" width="500" height="52" rx="8" fill="#fff" stroke="#a61923" stroke-width="2.5"/>
<text x="910" y="343" class="box-sub">state vector / discrete skill action / reward</text>

<!-- arrows to shared action -->
<path d="M370 385 L370 440 L715 440" fill="none" stroke="#555" stroke-width="4" marker-end="url(#arrow)"/>
<path d="M1130 385 L1130 440 L785 440" fill="none" stroke="#555" stroke-width="4" marker-end="url(#arrow)"/>

<!-- shared action -->
<rect x="235" y="455" width="1030" height="110" rx="14" fill="#fae9eb" stroke="#a61923" stroke-width="4"/>
<text x="295" y="500" class="panel-title">Shared Action System</text>
<text x="295" y="538" class="code">Move(direction)  |  Attack()  |  Block()  |  Dodge(direction)</text>

<path d="M750 565 L750 630" fill="none" stroke="#555" stroke-width="4" marker-end="url(#arrow)"/>

<!-- execution -->
<rect x="235" y="645" width="1030" height="105" rx="14" fill="#fff" stroke="#a61923" stroke-width="4"/>
<text x="295" y="688" class="panel-title">Game Logic / Combat Resolution</text>
<text x="295" y="728" class="box-sub">cooldown gates, hit checks, animation timing, state update, episode reset</text>

<path d="M750 750 L750 795" fill="none" stroke="#555" stroke-width="4" marker-end="url(#arrow)"/>

<!-- comparison -->
<rect x="310" y="810" width="880" height="54" rx="10" fill="#fae9eb" stroke="none"/>
<text x="365" y="844" class="small">Comparison output: win rate, survival time, action distribution, failure cases</text>
</svg>